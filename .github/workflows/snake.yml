name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#22D3EE&color_dot_0=#0D1117&color_dot_1=#1e1b4b&color_dot_2=#3730a3&color_dot_3=#6366F1&color_dot_4=#22D3EE
            dist/github-contribution-grid-snake-dark.svg?color_snake=#22D3EE&color_dot_0=#0D1117&color_dot_1=#1e1b4b&color_dot_2=#3730a3&color_dot_3=#6366F1&color_dot_4=#22D3EE
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
